<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<nav class="navbar navbar-dark">
<div class="container">
<span class="navbar-brand">
Admin Analytics Dashboard
</span>
</div>
</nav>

<div class="container mt-5">

<div class="row g-4">

<div class="col-md-3">
<div class="card shadow">
<div class="card-body">
<h6>Total Users</h6>
<h2>1250</h2>
</div>
</div>
</div>

<div class="col-md-3">
<div class="card shadow">
<div class="card-body">
<h6>File Uploads</h6>
<h2>3480</h2>
</div>
</div>
</div>

<div class="col-md-3">
<div class="card shadow">
<div class="card-body">
<h6>URLs Created</h6>
<h2>950</h2>
</div>
</div>
</div>

<div class="col-md-3">
<div class="card shadow">
<div class="card-body">
<h6>Active Users</h6>
<h2>420</h2>
</div>
</div>
</div>

</div>

<div class="card shadow mt-5 p-3">
<canvas id="analyticsChart"></canvas>
</div>

<div class="card shadow mt-5 p-3">

<h4>Recent Activities</h4>

<table class="table table-hover">

<thead>
<tr>
<th>User</th>
<th>Activity</th>
<th>Date</th>
</tr>
</thead>

<tbody>
<tr>
<td>John</td>
<td>Uploaded File</td>
<td>20-06-2026</td>
</tr>

<tr>
<td>Sarah</td>
<td>Shortened URL</td>
<td>20-06-2026</td>
</tr>

</tbody>

</table>

</div>

</div>

<script>

new Chart(
document.getElementById('analyticsChart'),
{
type:'bar',
data:{
labels:['Users','Uploads','URLs'],
datasets:[{
label:'Statistics',
data:[1250,3480,950]
}]
}
});

</script>

</body>
</html>
